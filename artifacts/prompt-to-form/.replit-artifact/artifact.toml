kind = "web"
previewPath = "/"
title = "Prompt to Form"
version = "1.0.0"
id = "artifacts/prompt-to-form"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18088

[services.development]
run = "pnpm --filter @workspace/prompt-to-form run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompt-to-form", "run", "build" ]
publicDir = "artifacts/prompt-to-form/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18088"
BASE_PATH = "/"
