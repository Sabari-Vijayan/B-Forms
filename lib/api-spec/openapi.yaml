openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: Prompt-to-Form API

servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: forms
    description: Form management
  - name: fields
    description: Form field management
  - name: submissions
    description: Form submissions
  - name: translations
    description: Form translations
  - name: templates
    description: Form templates

paths:
  /healthz:
    get:
      operationId: getHealth
      tags: [health]
      summary: Check API health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
                $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /forms:
    get:
      operationId: listForms
      tags: [forms]
      summary: List user's forms
      responses:
        "200":
          description: List of forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Form"
        "401":
          description: Unauthorized

    post:
      operationId: createForm
      tags: [forms]
      summary: Create a new form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormBody"
      responses:
        "201":
          description: Form created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormWithDocument"
        "401":
          description: Unauthorized

  /forms/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getForm
      tags: [forms]
      summary: Get form details
      responses:
        "200":
          description: Form details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormWithDocument"
        "404":
          description: Not found

    patch:
      operationId: updateForm
      tags: [forms]
      summary: Update form (metadata and document)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormBody"
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        "404":
          description: Not found

    delete:
      operationId: deleteForm
      tags: [forms]
      summary: Delete a form
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /forms/{id}/duplicate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: duplicateForm
      tags: [forms]
      summary: Duplicate an existing form
      responses:
        "201":
          description: Duplicated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Form"
        "404":
          description: Not found

  /forms/{id}/publish:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: publishForm
      tags: [forms]
      summary: Publish form and generate translations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishFormBody"
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishFormResult"
        "404":
          description: Not found

  /forms/{id}/sentiment-summary:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: generateFormSentimentSummary
      tags: [forms]
      summary: Generate AI sentiment analysis summary for a form
      responses:
        "200":
          description: Sentiment summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
        "404":
          description: Not found

  /forms/{id}/submissions:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listSubmissions
      tags: [submissions]
      summary: List all submissions for a form
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Submission"

  /forms/{id}/stats:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFormStats
      tags: [submissions]
      summary: Get submission statistics for a form
      responses:
        "200":
          description: Form stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormStats"

  /forms/{id}/translations:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listFormTranslations
      tags: [translations]
      summary: List all translations for a form
      responses:
        "200":
          description: List of translations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormTranslation"

  /forms/{id}/template:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getFormTemplate
      tags: [templates]
      summary: Get template info for a specific form
      responses:
        "200":
          description: Template entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormTemplate"
        "404":
          description: Not a template

    post:
      operationId: saveFormTemplate
      tags: [templates]
      summary: Save form as a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveTemplateBody"
      responses:
        "200":
          description: Template saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormTemplate"
        "404":
          description: Form not found

    delete:
      operationId: removeFormTemplate
      tags: [templates]
      summary: Remove template status from a form
      responses:
        "204":
          description: Removed
        "404":
          description: Not found

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List available templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Optional category filter
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormTemplate"

  /templates/my:
    get:
      operationId: listMyTemplates
      tags: [templates]
      summary: List current user's templates
      responses:
        "200":
          description: My templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormTemplate"
        "401":
          description: Unauthorized

  /templates/{id}/use:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: useTemplate
      tags: [templates]
      summary: Create a new form from a template
      responses:
        "201":
          description: New form created from template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormWithDocument"
        "404":
          description: Template not found

  /public/forms/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getPublicForm
      tags: [forms]
      summary: Get a published form by slug
      responses:
        "200":
          description: Public form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicForm"
        "404":
          description: Not found

  /public/forms/{slug}/submit:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    post:
      operationId: submitForm
      tags: [submissions]
      summary: Submit a form response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFormBody"
      responses:
        "201":
          description: Submission recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        "400":
          description: Validation error or form closed

  /ai/generate:
    post:
      operationId: generateForm
      tags: [forms]
      summary: Generate a form structure from a prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFormBody"
      responses:
        "200":
          description: Generated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFormResult"
        "401":
          description: Unauthorized

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [forms]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
      required: [id, email]

    Form:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        slug:
          type: string
        originalLanguage:
          type: string
        preferredLanguage:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published, closed]
        supportedLanguages:
          type: array
          items:
            type: string
        responseLimit:
          type: integer
          nullable: true
        closesAt:
          type: string
          nullable: true
        createdAt:
          type: string
        documentJson:
          $ref: "#/components/schemas/FormDocument"
      required: [id, userId, title, slug, originalLanguage, status, supportedLanguages, createdAt, documentJson]

    FormDocument:
      type: object
      properties:
        info:
          type: object
          properties:
            title:
              type: string
            description:
              type: string
              nullable: true
          required: [title]
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
      required: [info, items]

    Item:
      type: object
      properties:
        itemId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        questionItem:
          $ref: "#/components/schemas/QuestionItem"
      required: [itemId, title]

    QuestionItem:
      type: object
      properties:
        question:
          $ref: "#/components/schemas/Question"
      required: [question]

    Question:
      type: object
      properties:
        questionId:
          type: string
        required:
          type: boolean
        choiceQuestion:
          type: object
          properties:
            type:
              type: string
              enum: [RADIO, CHECKBOX, DROP_DOWN]
            options:
              type: array
              items:
                type: string
          required: [type, options]
        textQuestion:
          type: object
          properties:
            paragraph:
              type: boolean
          required: [paragraph]
        dateQuestion:
          type: object
        timeQuestion:
          type: object
        ratingQuestion:
          type: object
          properties:
            maxRating:
              type: integer
          required: [maxRating]
        fileQuestion:
          type: object
          properties:
            maxFiles:
              type: integer
            acceptedTypes:
              type: array
              items:
                type: string
      required: [questionId, required]

    FormTranslation:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        language:
          type: string
        translationsJson:
          type: object
          additionalProperties: true
        generatedAt:
          type: string
      required: [id, formId, language, translationsJson, generatedAt]

    Submission:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        respondentLanguage:
          type: string
        rawResponsesJson:
          type: object
          additionalProperties: true
        translatedResponsesJson:
          type: object
          additionalProperties: true
          nullable: true
        sentimentAnalysisJson:
          type: object
          additionalProperties: true
          nullable: true
        translationStatus:
          type: string
          enum: [pending, done, skipped]
        submittedAt:
          type: string
      required: [id, formId, respondentLanguage, rawResponsesJson, translationStatus, submittedAt]

    FormWithDocument:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        slug:
          type: string
        originalLanguage:
          type: string
        preferredLanguage:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published, closed]
        supportedLanguages:
          type: array
          items:
            type: string
        responseLimit:
          type: integer
          nullable: true
        closesAt:
          type: string
          nullable: true
        createdAt:
          type: string
        documentJson:
          $ref: "#/components/schemas/FormDocument"
      required: [id, userId, title, slug, originalLanguage, status, supportedLanguages, createdAt, documentJson]

    PublicForm:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        slug:
          type: string
        originalLanguage:
          type: string
        supportedLanguages:
          type: array
          items:
            type: string
        documentJson:
          $ref: "#/components/schemas/FormDocument"
        translations:
          type: array
          items:
            $ref: "#/components/schemas/FormTranslation"
      required: [id, title, slug, originalLanguage, supportedLanguages, documentJson, translations]

    FormStats:
      type: object
      properties:
        totalResponses:
          type: integer
        languageBreakdown:
          type: object
          additionalProperties:
            type: integer
        recentResponses:
          type: integer
      required: [totalResponses, languageBreakdown, recentResponses]

    DashboardSummary:
      type: object
      properties:
        totalForms:
          type: integer
        publishedForms:
          type: integer
        draftForms:
          type: integer
        totalResponses:
          type: integer
        recentForms:
          type: array
          items:
            $ref: "#/components/schemas/Form"
        weeklyTrend:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer
            required: [date, count]
        topLanguages:
          type: array
          items:
            type: object
            properties:
              language:
                type: string
              count:
                type: integer
            required: [language, count]
        mostActiveForm:
          type: object
          nullable: true
          properties:
            id:
              type: string
            title:
              type: string
            responseCount:
              type: integer
          required: [id, title, responseCount]
      required: [totalForms, publishedForms, draftForms, totalResponses, recentForms, weeklyTrend, topLanguages]

    UpdateMeBody:
      type: object
      properties:
        password:
          type: string
          minLength: 6
        preferredLanguage:
          type: string
          nullable: true

    CreateFormBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        originalLanguage:
          type: string
        documentJson:
          $ref: "#/components/schemas/FormDocument"
      required: [title, originalLanguage, documentJson]

    UpdateFormBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published, closed]
        preferredLanguage:
          type: string
          nullable: true
        supportedLanguages:
          type: array
          items:
            type: string
        responseLimit:
          type: integer
          nullable: true
        closesAt:
          type: string
          nullable: true
        documentJson:
          $ref: "#/components/schemas/FormDocument"

    PublishFormBody:
      type: object
      properties:
        languages:
          type: array
          items:
            type: string
      required: [languages]

    PublishFormResult:
      type: object
      properties:
        success:
          type: boolean
        failedLanguages:
          type: integer
        form:
          $ref: "#/components/schemas/Form"
      required: [success, failedLanguages, form]

    SubmitFormBody:
      type: object
      properties:
        respondentLanguage:
          type: string
        responses:
          type: object
          additionalProperties: true
      required: [respondentLanguage, responses]

    GenerateFormBody:
      type: object
      properties:
        prompt:
          type: string
        language:
          type: string
          description: BCP-47 language code to generate the form in (e.g. "en", "fr"). Defaults to auto-detect from prompt.
      required: [prompt]

    GenerateFormResult:
      type: object
      properties:
        form:
          $ref: "#/components/schemas/FormDocument"
        detectedLanguage:
          type: string
        featureImageUrl:
          type: string
          nullable: true
      required: [form, detectedLanguage]

    FormTemplate:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        category:
          type: string
        isPublic:
          type: boolean
        useCount:
          type: integer
        createdAt:
          type: string
        itemCount:
          type: integer
        documentJson:
          $ref: "#/components/schemas/FormDocument"
      required: [id, formId, userId, title, category, isPublic, useCount, createdAt, itemCount, documentJson]

    SaveTemplateBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        featureImageUrl:
          type: string
          nullable: true
        category:
          type: string
        isPublic:
          type: boolean
      required: [title, isPublic]
